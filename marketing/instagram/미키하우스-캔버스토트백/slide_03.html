<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(180deg, #FFFFFF 0%, #F8F5F0 100%);
      overflow: hidden;
      position: relative;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px;
      position: relative;
    }
    .logo {
      position: absolute;
      top: 50px;
      left: 50px;
      width: 140px;
      height: auto;
    }
    .header {
      text-align: center;
      margin-top: 60px;
      margin-bottom: 50px;
    }
    .header h2 {
      font-size: 44px;
      font-weight: 900;
      color: #1A1A1A;
    }
    .header h2 span {
      color: #C8102E;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      flex: 1;
      padding: 0 20px;
    }
    .color-item {
      background: white;
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.3s ease;
    }
    .color-item img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .color-name {
      margin-top: 12px;
      font-size: 22px;
      font-weight: 700;
      color: #333;
    }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    .accent-bar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .accent-bar span {
      width: 50px;
      height: 6px;
      border-radius: 3px;
    }
  </style>
</head>
