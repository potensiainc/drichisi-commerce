<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 캔버스 토트백 - Slide 5</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #FFF9F0 0%, #FFF5E8 100%);
      overflow: hidden;
      position: relative;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px;
      position: relative;
    }
    .logo {
      position: absolute;
      top: 50px;
      left: 50px;
      width: 140px;
      height: auto;
    }
    .header {
      text-align: center;
      margin-top: 80px;
      margin-bottom: 50px;
    }
    .tag {
      display: inline-block;
      background: #C8102E;
      color: white;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .header h2 {
      font-size: 44px;
      font-weight: 900;
      color: #1A1A1A;
    }
    .moments-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding: 0 40px;
      flex: 1;
      justify-content: center;
    }
    .moment {
      display: flex;
      align-items: center;
      gap: 30px;
      background: white;
      padding: 30px 40px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .moment-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #C8102E 0%, #E84A5F 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .moment-icon svg {
      width: 36px;
      height: 36px;
      fill: white;
    }
    .moment-text {
      font-size: 26px;
      font-weight: 600;
      color: #333;
      line-height: 1.5;
    }
    .moment-text span {
      color: #C8102E;
      font-weight: 700;
    }
    .bottom-accent {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bottom-accent span {
      font-size: 20px;
      font-weight: 700;
      color: #666;
    }
    .bottom-accent .line {
      width: 40px;
      height: 3px;
      background: #C8102E;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="../../../assets/brands/mikihouse/logo.png" alt="MIKIHOUSE" class="logo">
    <div class="header">
      <span class="tag">이럴 때 쓰세요</span>
      <h2>딱 필요한 순간마다</h2>
    </div>
    <div class="moments-grid">
      <div class="moment">
        <div class="moment-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <span class="moment-text">아이와 <span>공원 나들이</span> 갈 때<br>물병, 간식, 여벌옷 챙기기</span>
      </div>
      <div class="moment">
        <div class="moment-icon">
          <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
        <span class="moment-text">주말 <span>마트 장보기</span>에<br>에코백 대신 든든하게</span>
      </div>
      <div class="moment">
        <div class="moment-icon">
          <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
        </div>
        <span class="moment-text"><span>퇴근길</span>에 가볍게<br>서류와 텀블러만 쏙</span>
      </div>
    </div>
    <div class="bottom-accent">
      <div class="line"></div>
      <span>매일 들기 좋은 사이즈</span>
      <div class="line"></div>
    </div>
  </div>
</body>
</html>
