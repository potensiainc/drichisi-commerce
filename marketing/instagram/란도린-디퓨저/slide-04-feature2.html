<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>란도린 디퓨저 - Slide 04 Feature 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Noto Serif KR', serif;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(180deg, #F7F6F3 0%, #EDE9E3 100%);
      display: flex;
      flex-direction: column;
      padding: 80px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 60px;
    }

    .feature-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.4em;
      color: #C9A65C;
      text-transform: uppercase;
    }

    .headline {
      font-family: 'Noto Serif KR', serif;
      font-size: 52px;
      font-weight: 600;
      color: #1A1510;
      line-height: 1.4;
    }

    .highlight {
      color: #B8922D;
      font-weight: 700;
    }

    .pyramid-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px;
    }

    .note-row {
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 30px 40px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      border-left: 3px solid #C9A65C;
    }

    .note-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #B8922D;
      text-transform: uppercase;
      width: 110px;
    }

    .note-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-names {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 600;
      color: #1A1510;
    }

    .note-desc {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 400;
      color: #5A5550;
    }

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #D4CFC8;
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 30px; left: 30px; border-top-width: 1px; border-left-width: 1px; }
    .corner-tr { top: 30px; right: 30px; border-top-width: 1px; border-right-width: 1px; }
    .corner-bl { bottom: 30px; left: 30px; border-bottom-width: 1px; border-left-width: 1px; }
    .corner-br { bottom: 30px; right: 30px; border-bottom-width: 1px; border-right-width: 1px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4CFC8;
    }

    .dot.active {
      background: #C9A65C;
      width: 24px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="header">
      <span class="feature-number">Feature 02</span>
      <h2 class="headline"><span class="highlight">3단계</span>로 퍼지는 향</h2>
    </div>

    <div class="pyramid-section">
      <div class="note-row">
        <span class="note-label">Top</span>
        <div class="note-content">
          <span class="note-names">피치 · 애플</span>
          <span class="note-desc">처음 맡았을 때 상큼한 첫인상</span>
        </div>
      </div>

      <div class="note-row">
        <span class="note-label">Middle</span>
        <div class="note-content">
          <span class="note-names">로즈 · 뮤게 · 재스민</span>
          <span class="note-desc">공간에 은은하게 퍼지는 플로럴</span>
        </div>
      </div>

      <div class="note-row">
        <span class="note-label">Last</span>
        <div class="note-content">
          <span class="note-names">우디 · 머스크 · 시더</span>
          <span class="note-desc">오래 남는 따뜻한 잔향</span>
        </div>
      </div>
    </div>

    <div class="slide-indicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
