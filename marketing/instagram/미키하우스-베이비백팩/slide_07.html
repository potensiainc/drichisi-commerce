<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 베이비 백팩 - Slide 7</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }
    .container {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #C8102E 0%, #A00D24 50%, #800A1C 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    .gold-circle {
      position: absolute;
      width: 600px;
      height: 600px;
      border: 3px solid rgba(255,215,0,0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .gold-circle-2 {
      position: absolute;
      width: 750px;
      height: 750px;
      border: 2px solid rgba(255,215,0,0.15);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .content {
      position: relative;
      z-index: 1;
    }
    .brand-logo-large {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      margin-bottom: 40px;
      opacity: 0.9;
    }
    .cta-title {
      font-size: 58px;
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 30px;
    }
    .gold-text {
      color: #FFD700;
    }
    .cta-subtitle {
      font-size: 28px;
      margin-bottom: 50px;
      opacity: 0.9;
    }
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #333;
      padding: 25px 60px;
      font-size: 26px;
      font-weight: 900;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .product-images {
      position: absolute;
      bottom: 80px;
      display: flex;
      gap: 30px;
    }
    .small-product {
      width: 120px;
      height: 120px;
      object-fit: contain;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 10px;
    }
    .swipe-hint {
      position: absolute;
      bottom: 30px;
      font-size: 16px;
      opacity: 0.7;
      letter-spacing: 2px;
    }
    .star-decoration {
      position: absolute;
      font-size: 24px;
      color: #FFD700;
      opacity: 0.6;
    }
    .star-1 { top: 100px; left: 150px; }
    .star-2 { top: 200px; right: 120px; }
    .star-3 { bottom: 200px; left: 100px; }
    .star-4 { bottom: 300px; right: 150px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="gold-circle"></div>
    <div class="gold-circle-2"></div>
    <div class="star-decoration star-1">&#10022;</div>
    <div class="star-decoration star-2">&#10022;</div>
    <div class="star-decoration star-3">&#10022;</div>
    <div class="star-decoration star-4">&#10022;</div>
    <div class="content">
      <div class="brand-logo-large">MIKIHOUSE</div>
      <h1 class="cta-title">우리 아기 <span class="gold-text">첫 백팩</span><br>지금 만나보세요</h1>
      <p class="cta-subtitle">일본 프리미엄 베이비 브랜드</p>
      <a href="#" class="cta-button">SHOP NOW</a>
    </div>
    <div class="swipe-hint">LINK IN BIO</div>
  </div>
</body>
</html>
