<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 베이비 백팩 - Slide 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }
    .container {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .badge {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%);
      color: #1a1a2e;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: 900;
      border-radius: 30px;
      letter-spacing: 2px;
    }
    .main-title {
      font-size: 54px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 60px;
      line-height: 1.3;
    }
    .highlight {
      color: #FFD700;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      padding: 0 80px;
    }
    .feature-card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 35px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .feature-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #C8102E 0%, #E31837 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
    }
    .feature-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .feature-desc {
      font-size: 18px;
      opacity: 0.8;
      line-height: 1.4;
    }
    .brand-logo {
      position: absolute;
      bottom: 40px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      opacity: 0.7;
    }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,16,46,0.3) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <div class="content">
      <div class="badge">DESIGN DETAIL</div>
      <h1 class="main-title" style="margin-top: 80px;">귀여운 <span class="highlight">미키하우스</span><br>로고 자수</h1>
      <div class="features-grid">
        <div class="feature-card">
          <div class="feature-icon">&#9733;</div>
          <h3 class="feature-title">시그니처 로고</h3>
          <p class="feature-desc">미키하우스만의<br>귀여운 로고 자수</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#9830;</div>
          <h3 class="feature-title">고급 자수 기법</h3>
          <p class="feature-desc">세탁해도 변형 없는<br>고급 자수 마감</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#9829;</div>
          <h3 class="feature-title">어디서나 눈에 띄는</h3>
          <p class="feature-desc">아기 백팩이<br>더욱 특별해져요</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#10022;</div>
          <h3 class="feature-title">프리미엄 브랜드</h3>
          <p class="feature-desc">일본 대표<br>베이비 브랜드</p>
        </div>
      </div>
    </div>
    <div class="brand-logo">MIKIHOUSE</div>
  </div>
</body>
</html>
