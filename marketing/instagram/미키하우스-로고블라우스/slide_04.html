<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미키하우스 블라우스 - Slide 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Noto Sans KR', sans-serif;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .gold-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
        }
        .header {
            padding: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-label {
            color: #FFD700;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 3px;
        }
        .page-num {
            font-size: 20px;
            color: #666;
            font-weight: 500;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 60px;
        }
        .japan-flag {
            width: 100px;
            height: 70px;
            background: white;
            border-radius: 5px;
            position: relative;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .japan-flag::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            background: #C8102E;
            border-radius: 50%;
        }
        .main-title {
            font-size: 56px;
            font-weight: 900;
            color: white;
            text-align: center;
            margin-bottom: 25px;
        }
        .highlight {
            color: #FFD700;
        }
        .desc {
            font-size: 26px;
            color: #aaa;
            text-align: center;
            line-height: 1.8;
            max-width: 700px;
        }
        .quality-badges {
            display: flex;
            gap: 30px;
            margin-top: 50px;
        }
        .quality-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .badge-circle {
            width: 100px;
            height: 100px;
            border: 3px solid #FFD700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .badge-icon {
            font-size: 32px;
            color: #FFD700;
            font-weight: 700;
        }
        .badge-text {
            font-size: 18px;
            color: white;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="gold-bar"></div>
    <div class="header">
        <span class="section-label">MADE IN JAPAN</span>
        <span class="page-num">02</span>
    </div>
    <div class="main-content">
        <div class="japan-flag"></div>
        <h2 class="main-title">일본 제조<br><span class="highlight">품질 보증</span></h2>
        <p class="desc">
            일본 국내 제조로 엄격한 품질 관리를 거친 정품입니다.<br>
            미키하우스만의 섬세한 봉제 기술과<br>
            내구성 있는 마감으로 오래도록 착용할 수 있습니다.
        </p>
        <div class="quality-badges">
            <div class="quality-badge">
                <div class="badge-circle">
                    <span class="badge-icon">QC</span>
                </div>
                <span class="badge-text">품질 검수</span>
            </div>
            <div class="quality-badge">
                <div class="badge-circle">
                    <span class="badge-icon">JP</span>
                </div>
                <span class="badge-text">일본 생산</span>
            </div>
            <div class="quality-badge">
                <div class="badge-circle">
                    <span class="badge-icon">A+</span>
                </div>
                <span class="badge-text">프리미엄</span>
            </div>
        </div>
    </div>
</body>
</html>
