<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미키하우스 블라우스 - Slide 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Noto Sans KR', sans-serif;
            background: #C8102E;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .pattern-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 2px,
                transparent 2px,
                transparent 12px
            );
        }
        .content-box {
            background: white;
            border-radius: 30px;
            padding: 60px;
            width: 900px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        .section-title {
            font-size: 24px;
            color: #C8102E;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .main-text {
            font-size: 42px;
            font-weight: 900;
            color: #333;
            line-height: 1.5;
            margin-bottom: 40px;
        }
        .feature-list {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .feature-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .feature-text {
            font-size: 22px;
            font-weight: 700;
            color: #333;
        }
        .gold-accent {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 6px;
            background: #FFD700;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="pattern-overlay"></div>
    <div class="content-box">
        <p class="section-title">WHY MIKIHOUSE</p>
        <h2 class="main-text">아이 피부를 생각한<br>프리미엄 품질</h2>
        <div class="feature-list">
            <div class="feature-item">
                <div class="feature-icon">JP</div>
                <span class="feature-text">일본 제조</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">100%</div>
                <span class="feature-text">순면 소재</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">M</div>
                <span class="feature-text">프리미엄 디테일</span>
            </div>
        </div>
    </div>
    <div class="gold-accent"></div>
</body>
</html>
