<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미키하우스 블라우스 - Slide 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(180deg, #FFFBF0 0%, #FFF5E6 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .header {
            padding: 50px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-label {
            background: #C8102E;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 18px;
        }
        .page-num {
            font-size: 20px;
            color: #999;
            font-weight: 500;
        }
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 60px;
            gap: 50px;
        }
        .product-image {
            width: 480px;
            height: 550px;
            object-fit: contain;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.12));
        }
        .text-content {
            flex: 1;
        }
        .feature-title {
            font-size: 48px;
            font-weight: 900;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.3;
        }
        .feature-title span {
            color: #C8102E;
        }
        .feature-desc {
            font-size: 24px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .badge-row {
            display: flex;
            gap: 15px;
        }
        .badge {
            background: white;
            border: 3px solid #FFD700;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 18px;
            color: #333;
        }
        .cotton-icon {
            position: absolute;
            bottom: 80px;
            right: 80px;
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cotton-icon::after {
            content: "COTTON 100%";
            font-size: 14px;
            font-weight: 700;
            color: #C8102E;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="section-label">MATERIAL</span>
        <span class="page-num">01</span>
    </div>
    <div class="main-content">
        <img src="../../products/[미키하우스]_긴팔블라우스_無地_로고_日本製_면100％_남아_여아_베이비_키즈_아동복_13-5402-144/images/nobg/image_01_nobg.png" alt="면 소재" class="product-image">
        <div class="text-content">
            <h2 class="feature-title">면 100%<br><span>순면 소재</span></h2>
            <p class="feature-desc">
                흡습성이 뛰어난 천연 면 100% 소재로<br>
                아이의 민감한 피부를 부드럽게 감싸줍니다.<br>
                통기성이 좋아 땀을 잘 흡수하며,<br>
                사계절 쾌적하게 착용할 수 있습니다.
            </p>
            <div class="badge-row">
                <span class="badge">통기성</span>
                <span class="badge">흡습성</span>
                <span class="badge">저자극</span>
            </div>
        </div>
    </div>
    <div class="cotton-icon"></div>
</body>
</html>
