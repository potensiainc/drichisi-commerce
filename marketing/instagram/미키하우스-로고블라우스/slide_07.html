<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미키하우스 블라우스 - Slide 7</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #C8102E 0%, #8B0000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .sparkle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        .sparkle-1 { top: 100px; left: 150px; width: 30px; height: 30px; }
        .sparkle-2 { top: 200px; right: 200px; width: 25px; height: 25px; }
        .sparkle-3 { bottom: 250px; left: 100px; width: 20px; height: 20px; }
        .sparkle-4 { bottom: 150px; right: 120px; width: 35px; height: 35px; }
        .sparkle-5 { top: 300px; left: 80px; width: 15px; height: 15px; }
        .content-box {
            background: white;
            border-radius: 40px;
            padding: 70px 80px;
            text-align: center;
            max-width: 850px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            position: relative;
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            color: #C8102E;
            letter-spacing: 5px;
            margin-bottom: 30px;
        }
        .main-text {
            font-size: 46px;
            font-weight: 900;
            color: #333;
            line-height: 1.4;
            margin-bottom: 35px;
        }
        .highlight {
            color: #C8102E;
        }
        .product-features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .feature-tag {
            background: #FFF5F5;
            border: 2px solid #C8102E;
            color: #C8102E;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
        }
        .cta-button {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
            padding: 25px 60px;
            border-radius: 50px;
            font-size: 26px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        .swipe-hint {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="sparkle sparkle-1"></div>
    <div class="sparkle sparkle-2"></div>
    <div class="sparkle sparkle-3"></div>
    <div class="sparkle sparkle-4"></div>
    <div class="sparkle sparkle-5"></div>

    <div class="content-box">
        <p class="brand-logo">MIKIHOUSE</p>
        <h2 class="main-text">
            일본 No.1 베이비 브랜드<br>
            <span class="highlight">미키하우스 블라우스</span>
        </h2>
        <div class="product-features">
            <span class="feature-tag">면 100%</span>
            <span class="feature-tag">일본 제조</span>
            <span class="feature-tag">유니섹스</span>
            <span class="feature-tag">프리미엄 디테일</span>
        </div>
        <div class="cta-button">지금 바로 만나보세요</div>
    </div>

    <p class="swipe-hint">링크는 프로필에서 확인하세요</p>
</body>
</html>
