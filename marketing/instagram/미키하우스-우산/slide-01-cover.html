<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 우산 - Slide 01 Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(180deg, #FFE4E8 0%, #FFB6C1 100%);
    }

    .rain-drops {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(ellipse 3px 8px at 10% 15%, rgba(135, 206, 235, 0.4) 50%, transparent 50%),
        radial-gradient(ellipse 3px 8px at 25% 35%, rgba(135, 206, 235, 0.3) 50%, transparent 50%),
        radial-gradient(ellipse 3px 8px at 45% 10%, rgba(135, 206, 235, 0.4) 50%, transparent 50%),
        radial-gradient(ellipse 3px 8px at 65% 25%, rgba(135, 206, 235, 0.3) 50%, transparent 50%),
        radial-gradient(ellipse 3px 8px at 80% 40%, rgba(135, 206, 235, 0.4) 50%, transparent 50%),
        radial-gradient(ellipse 3px 8px at 90% 8%, rgba(135, 206, 235, 0.3) 50%, transparent 50%);
      pointer-events: none;
    }

    .top-brand {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
    }

    .top-brand img {
      width: 180px;
      height: auto;
    }

    .product-image {
      position: absolute;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      width: 550px;
      height: auto;
      filter: drop-shadow(0 25px 50px rgba(0,0,0,0.2));
    }

    .content {
      position: absolute;
      bottom: 120px;
      left: 80px;
      right: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 15px;
    }

    .brand-tag {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #C8102E;
      text-transform: uppercase;
    }

    .headline {
      font-size: 50px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.35;
    }

    .highlight {
      color: #C8102E;
      font-weight: 800;
    }

    .sub-text {
      font-size: 26px;
      font-weight: 500;
      color: #555;
      margin-top: 5px;
    }

    .corner {
      position: absolute;
      width: 50px;
      height: 50px;
      border-color: rgba(200, 16, 46, 0.3);
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 40px; left: 40px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 40px; right: 40px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(200, 16, 46, 0.3);
    }

    .dot.active {
      background: #C8102E;
      width: 24px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rain-drops"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="top-brand">
      <img src="file:///D:/commerce/assets/brands/mikihouse/logo.png" alt="mikiHOUSE">
    </div>

    <img class="product-image" src="file:///D:/commerce/products/[미키하우스]_かさ_傘_45cm_長傘_雨具_レイングッズ_로고_くま_うさぎ_남아_여아_베이비_키즈_아동복_幼稚園_保育園_통원_10-8841-686/images/nobg/pink_01_nobg.png" alt="미키하우스 우산">

    <div class="content">
      <span class="brand-tag">Since 1971</span>
      <h1 class="headline">
        우리 아이 <span class="highlight">첫 우산</span><br>
        비 오는 날도 즐겁게
      </h1>
      <p class="sub-text">45cm / 유치원 통원용</p>
    </div>

    <div class="slide-indicator">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
