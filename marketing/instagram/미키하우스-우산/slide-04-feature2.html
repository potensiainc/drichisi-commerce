  <style>
    * {

      padding: 0;

    }

    body {
      width: 1080px;

      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1080px;

      position: relative;
      background: linear-gradient(180deg, #FFFFFF 0%, #F5F5F5 100%);
      display: flex;
      flex-direction: column;
      padding: 80px;

    .highlight {

    }

    .color-grid {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      padding: 20px 0;
    }

    .color-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .color-item img {
      width: 340px;
      height: auto;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15));
    }

    .color-info {
      display: flex;

      gap: 8px;
    }

    .color-name {

      font-weight: 600;

      border-radius: 20px;
    }

    .character-name {
      font-size: 16px;
      font-weight: 500;
      color: #888;
    }

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #E0E0E0;
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 30px; left: 30px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 30px; right: 30px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 30px; left: 30px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 30px; right: 30px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #E0E0E0;
    }

    .dot.active {
      background: #C8102E;
      width: 24px;
      border-radius: 3px;
