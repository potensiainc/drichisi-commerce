<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #2C3E5F 0%, #1a2744 100%);
      overflow: hidden;
      position: relative;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
    }
    .slide-number {
      position: absolute;
      top: 50px;
      left: 60px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
    }
    .product-image {
      width: 350px;
      height: 420px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
      margin-bottom: 40px;
    }
    .headline {
      font-size: 48px;
      font-weight: 900;
      color: white;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 15px;
    }
    .subline {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-bottom: 40px;
    }
    .price-tag {
      background: white;
      color: #2C3E5F;
      padding: 20px 50px;
      border-radius: 50px;
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    .price-tag .currency {
      font-size: 20px;
      font-weight: 500;
      margin-right: 5px;
    }
    .cta-text {
      font-size: 18px;
      color: #FFD700;
      text-align: center;
      font-weight: 500;
    }
    .brand-badge {
      position: absolute;
      bottom: 50px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .brand-logo {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 25px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .japan-mark {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }
    .decorative-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
    }
    .circle-1 {
      width: 500px;
      height: 500px;
      border: 2px solid #FFC0CB;
      top: -150px;
      right: -150px;
    }
    .circle-2 {
      width: 400px;
      height: 400px;
      border: 2px solid #FFD700;
      bottom: -100px;
      left: -100px;
    }
  </style>
</head>
<body>
  <div class="decorative-circle circle-1"></div>
  <div class="decorative-circle circle-2"></div>

  <div class="container">
    <div class="slide-number">07 / 07</div>

    <img src="../../products/[미키하우스]_팬츠_ロング팬츠_로고_うさぎ_10分丈_長ズボン_日本製_여아_베이비_키즈_아동복_13-3226-146/images/nobg/thumbnail_nobg.png" class="product-image" alt="미키하우스 토끼 팬츠">

    <h1 class="headline">
      아이는 편하게<br>
      엄마는 안심하고
    </h1>
    <p class="subline">미키하우스 토끼 와펜 긴 바지</p>

    <div class="price-tag">
      <span class="currency">JPY</span>3,998
    </div>

    <p class="cta-text">프로필 링크에서 구매하세요</p>

    <div class="brand-badge">
      <span class="brand-logo">MIKIHOUSE</span>
      <span class="japan-mark">MADE IN JAPAN</span>
    </div>
  </div>
</body>
</html>
