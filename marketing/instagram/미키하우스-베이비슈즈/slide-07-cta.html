<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 베이비슈즈 - Slide 07 CTA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(180deg, #C8102E 0%, #8B0000 100%);
    }

    .product-images {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }

    .product-images img {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
    }

    .product-images img:nth-child(2),
    .product-images img:nth-child(5) {
      margin-top: 30px;
    }

    .content {
      position: absolute;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 30px;
    }

    .brand-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)) drop-shadow(0 4px 20px rgba(0,0,0,0.2));
    }

    .brand-sub {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FFD700, transparent);
    }

    .cta-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .cta-text {
      font-size: 34px;
      font-weight: 600;
      color: #FFFFFF;
      line-height: 1.5;
      text-shadow:
        0 2px 4px rgba(0,0,0,0.3),
        0 4px 20px rgba(0,0,0,0.2);
    }

    .cta-highlight {
      color: #FFD700;
      font-weight: 700;
    }

    .instagram-handle {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px 36px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
    }

    .instagram-icon {
      width: 26px;
      height: 26px;
    }

    .handle-text {
      font-size: 24px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 0.05em;
    }

    .badge {
      position: absolute;
      top: 90px;
      right: 90px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255,215,0,0.2);
      border: 2px solid rgba(255,215,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .badge-text {
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.3;
    }

    .badge-rating {
      font-size: 22px;
      font-weight: 800;
      color: #FFD700;
    }

    .corner {
      position: absolute;
      width: 50px;
      height: 50px;
      border-color: rgba(255,255,255,0.3);
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 40px; left: 40px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 40px; right: 40px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }

    .dot.active {
      background: #FFD700;
      width: 24px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="badge">
      <span class="badge-text">평점</span>
      <span class="badge-rating">4.6</span>
      <span class="badge-text">27개 리뷰</span>
    </div>

    <div class="product-images">
      <img src="file:///D:/commerce/products/[미키하우스_HOT_BISCUITS]_[미키하우스_ホットビスケッツ]_セカンド베이비シューズ_남아_여아_베이비_키즈_メッシュ_70-9321-493___70-9325-143/images/nobg/multicolor_nobg.png" alt="멀티컬러">
      <img src="file:///D:/commerce/products/[미키하우스_HOT_BISCUITS]_[미키하우스_ホットビスケッツ]_セカンド베이비シューズ_남아_여아_베이비_키즈_メッシュ_70-9321-493___70-9325-143/images/nobg/pink_nobg.png" alt="핑크">
      <img src="file:///D:/commerce/products/[미키하우스_HOT_BISCUITS]_[미키하우스_ホットビスケッツ]_セカンド베이비シューズ_남아_여아_베이비_키즈_メッシュ_70-9321-493___70-9325-143/images/nobg/blue_nobg.png" alt="블루">
      <img src="file:///D:/commerce/products/[미키하우스_HOT_BISCUITS]_[미키하우스_ホットビスケッツ]_セカンド베이비シューズ_남아_여아_베이비_키즈_メッシュ_70-9321-493___70-9325-143/images/nobg/beige_nobg.png" alt="베이지">
      <img src="file:///D:/commerce/products/[미키하우스_HOT_BISCUITS]_[미키하우스_ホットビスケッツ]_セカンド베이비シューズ_남아_여아_베이비_키즈_メッシュ_70-9321-493___70-9325-143/images/nobg/white_blue_nobg.png" alt="화이트블루">
    </div>

    <div class="content">
      <div class="brand-section">
        <img class="brand-logo" src="file:///D:/commerce/assets/brands/mikihouse/logo_nobg.png" alt="mikiHOUSE">
        <span class="brand-sub">HOT BISCUITS · Since 1971</span>
      </div>

      <div class="divider"></div>

      <div class="cta-section">
        <p class="cta-text">
          <span class="cta-highlight">프로필 링크</span>에서<br>
          만나요
        </p>

        <div class="instagram-handle">
          <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="5" stroke="#FFFFFF" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="5" stroke="#FFFFFF" stroke-width="1.5"/>
            <circle cx="18" cy="6" r="1.5" fill="#FFD700"/>
          </svg>
          <span class="handle-text">@drichisi_</span>
        </div>
      </div>
    </div>

    <div class="slide-indicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
  </div>
</body>
</html>
