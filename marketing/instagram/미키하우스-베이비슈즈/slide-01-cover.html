<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 베이비슈즈 - Slide 01 Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(180deg, #FFF5F8 0%, #FFE4EC 100%);
    }

    .top-brand {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
    }

    .top-brand img {
      width: 180px;
      height: auto;
    }

    .product-image {
      position: absolute;
      top: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      height: auto;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2));
    }

    .content {
      position: absolute;
      bottom: 120px;
      left: 80px;
      right: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 15px;
    }

    .brand-tag {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #C8102E;
      text-transform: uppercase;
    }

    .headline {
      font-size: 48px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.35;
    }

    .highlight {
      color: #C8102E;
      font-weight: 800;
    }

    .sub-text {
      font-size: 24px;
      font-weight: 400;
      color: #666;
      margin-top: 5px;
    }

    .corner {
      position: absolute;
      width: 50px;
      height: 50px;
      border-color: rgba(200, 16, 46, 0.3);
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 40px; left: 40px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 40px; right: 40px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(200, 16, 46, 0.3);
    }

    .dot.active {
      background: #C8102E;
      width: 24px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="top-brand">
      <img src="file:///D:/commerce/assets/brands/mikihouse/logo.png" alt="mikiHOUSE">
    </div>

    <img class="product-image" src="file:///D:/commerce/products/[미키하우스_HOT_BISCUITS]_[미키하우스_ホットビスケッツ]_セカンド베이비シューズ_남아_여아_베이비_키즈_メッシュ_70-9321-493___70-9325-143/images/nobg/multicolor_nobg.png" alt="미키하우스 베이비슈즈">

    <div class="content">
      <span class="brand-tag">HOT BISCUITS</span>
      <h1 class="headline">
        우리 아이 <span class="highlight">첫 걸음마</span>를<br>
        응원하는 세컨드 슈즈
      </h1>
      <p class="sub-text">일본 프리미엄 베이비 슈즈</p>
    </div>

    <div class="slide-indicator">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
