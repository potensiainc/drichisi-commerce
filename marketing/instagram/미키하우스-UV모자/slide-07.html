<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 UV모자 - Slide 07</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(145deg, #FFF5F5 0%, #FFFFFF 50%, #FFF9E6 100%);
      overflow: hidden;
      position: relative;
    }
    .header {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      text-align: center;
    }
    .header h2 {
      font-size: 42px;
      font-weight: 900;
      color: #222;
      line-height: 1.4;
    }
    .header h2 span {
      color: #C8102E;
    }
    .product-showcase {
      position: absolute;
      top: 200px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }
    .product-showcase img {
      width: 240px;
      height: 240px;
      object-fit: contain;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }
    .spec-summary {
      position: absolute;
      top: 500px;
      left: 60px;
      right: 60px;
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
    }
    .spec-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      text-align: center;
    }
    .spec-item {
      padding: 20px;
    }
    .spec-item-label {
      font-size: 16px;
      color: #999;
      margin-bottom: 8px;
    }
    .spec-item-value {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }
    .spec-item-value.highlight {
      color: #C8102E;
    }
    .cta-section {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
    }
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #C8102E 0%, #A00D25 100%);
      color: white;
      padding: 24px 80px;
      border-radius: 50px;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(200, 16, 46, 0.3);
      margin-bottom: 20px;
    }
    .cta-sub {
      font-size: 20px;
      color: #666;
    }
    .brand-badge {
      position: absolute;
      top: 40px;
      right: 40px;
      background: #FFD700;
      color: #333;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 700;
    }
    .decorative-dots {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #DDD;
    }
    .dot.active {
      background: #C8102E;
      width: 36px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="brand-badge">MIKIHOUSE</div>

  <div class="header">
    <h2>우리 아이 첫 모자<br><span>미키하우스 UV차단 모자</span></h2>
  </div>

  <div class="product-showcase">
    <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ピンク/image_01.jpg" alt="핑크">
    <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ブルー/image_01.jpg" alt="블루">
    <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/イエロー/image_01.jpg" alt="옐로우">
    <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ネイビー/image_01.jpg" alt="네이비">
  </div>

  <div class="spec-summary">
    <div class="spec-grid">
      <div class="spec-item">
        <div class="spec-item-label">소재</div>
        <div class="spec-item-value highlight">면 100%</div>
      </div>
      <div class="spec-item">
        <div class="spec-item-label">사이즈</div>
        <div class="spec-item-value">46~56cm</div>
      </div>
      <div class="spec-item">
        <div class="spec-item-label">컬러</div>
        <div class="spec-item-value">4가지</div>
      </div>
      <div class="spec-item">
        <div class="spec-item-label">기능</div>
        <div class="spec-item-value highlight">UV차단</div>
      </div>
      <div class="spec-item">
        <div class="spec-item-label">특징</div>
        <div class="spec-item-value">햇빛가리개</div>
      </div>
      <div class="spec-item">
        <div class="spec-item-label">브랜드</div>
        <div class="spec-item-value">MIKIHOUSE</div>
      </div>
    </div>
  </div>

  <div class="cta-section">
    <div class="cta-button">프로필 링크에서 구매</div>
    <div class="cta-sub">Since 1971, MIKIHOUSE</div>
  </div>

  <div class="decorative-dots">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot active"></span>
  </div>
</body>
</html>
