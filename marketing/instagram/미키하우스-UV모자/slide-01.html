<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 UV모자 - Slide 01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(145deg, #FFF5F5 0%, #FFE8E8 100%);
      overflow: hidden;
      position: relative;
    }
    .brand-badge {
      position: absolute;
      top: 40px;
      left: 40px;
      background: #C8102E;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(200, 16, 46, 0.3);
    }
    .hero-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -45%);
      width: 650px;
      height: auto;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15));
    }
    .main-text {
      position: absolute;
      bottom: 180px;
      left: 0;
      right: 0;
      text-align: center;
    }
    .main-text h1 {
      font-size: 56px;
      font-weight: 900;
      color: #C8102E;
      line-height: 1.3;
      text-shadow: 0 2px 10px rgba(200, 16, 46, 0.1);
    }
    .main-text h1 span {
      color: #333;
    }
    .sub-text {
      position: absolute;
      bottom: 120px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 28px;
      color: #666;
      font-weight: 500;
    }
    .decorative-circle {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700 0%, #FFAA00 100%);
      opacity: 0.2;
    }
    .circle-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -50px;
    }
    .circle-2 {
      width: 200px;
      height: 200px;
      bottom: 50px;
      left: -80px;
    }
    .swipe-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      color: #999;
      font-size: 16px;
    }
    .swipe-hint svg {
      width: 24px;
      height: 24px;
      fill: #999;
    }
  </style>
</head>
<body>
  <div class="decorative-circle circle-1"></div>
  <div class="decorative-circle circle-2"></div>

  <div class="brand-badge">MIKIHOUSE</div>

  <img class="hero-image" src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ピンク/image_01.jpg" alt="미키하우스 UV모자">

  <div class="main-text">
    <h1>목덜미까지 지켜주는<br><span>UV차단 햇빛가리개 모자</span></h1>
  </div>

  <div class="sub-text">놀이터에서 뛰어놀 때도 안심</div>

  <div class="swipe-hint">
    <span>밀어서 더 보기</span>
    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
  </div>
</body>
</html>
