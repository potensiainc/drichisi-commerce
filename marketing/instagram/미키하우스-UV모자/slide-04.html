<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 UV모자 - Slide 04</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: #FFFFFF;
      overflow: hidden;
      position: relative;
    }
    .header {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      text-align: center;
    }
    .header .tag {
      display: inline-block;
      background: #FFD700;
      color: #333;
      padding: 10px 28px;
      border-radius: 25px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .header h2 {
      font-size: 44px;
      font-weight: 900;
      color: #222;
      line-height: 1.4;
    }
    .header h2 span {
      color: #C8102E;
    }
    .color-grid {
      position: absolute;
      top: 260px;
      left: 60px;
      right: 60px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }
    .color-card {
      background: #F8F8F8;
      border-radius: 24px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
    }
    .color-card img {
      width: 300px;
      height: 300px;
      object-fit: contain;
      margin-bottom: 15px;
    }
    .color-name {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }
    .color-dot.pink { background: #FFB6C1; }
    .color-dot.blue { background: #87CEEB; }
    .color-dot.yellow { background: #FFE082; }
    .color-dot.navy { background: #6A7B9E; }
    .bottom-text {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 24px;
      color: #666;
    }
    .bottom-text strong {
      color: #C8102E;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="tag">4 Colors</div>
    <h2><span>파스텔 4컬러</span><br>남아 여아 모두 OK</h2>
  </div>

  <div class="color-grid">
    <div class="color-card">
      <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ピンク/image_01.jpg" alt="핑크">
      <div class="color-name">
        <span class="color-dot pink"></span>
        핑크
      </div>
    </div>
    <div class="color-card">
      <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ブルー/image_01.jpg" alt="블루">
      <div class="color-name">
        <span class="color-dot blue"></span>
        블루
      </div>
    </div>
    <div class="color-card">
      <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/イエロー/image_01.jpg" alt="옐로우">
      <div class="color-name">
        <span class="color-dot yellow"></span>
        옐로우
      </div>
    </div>
    <div class="color-card">
      <img src="../../../products/[미키하우스]_帽子_ハット_UVカット_日よけカバー付き_면100％_ゴム付き_남아_여아_베이비_키즈_아기_아동복_12-9105-684/images/ネイビー/image_01.jpg" alt="네이비">
      <div class="color-name">
        <span class="color-dot navy"></span>
        네이비
      </div>
    </div>
  </div>

  <div class="bottom-text">어떤 옷에도 잘 어울리는 <strong>깅엄 체크 포인트</strong></div>
</body>
</html>
