<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 UV모자 - Slide 06</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: #C8102E;
      overflow: hidden;
      position: relative;
    }
    .brand-section {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .brand-logo {
      font-size: 72px;
      font-weight: 900;
      color: white;
      letter-spacing: 8px;
      margin-bottom: 20px;
    }
    .brand-subtitle {
      font-size: 28px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 60px;
    }
    .brand-story {
      max-width: 800px;
      margin: 0 auto;
    }
    .timeline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 50px;
    }
    .timeline-item {
      text-align: center;
      color: white;
    }
    .timeline-year {
      font-size: 48px;
      font-weight: 900;
      color: #FFD700;
    }
    .timeline-text {
      font-size: 18px;
      opacity: 0.9;
    }
    .timeline-divider {
      width: 80px;
      height: 3px;
      background: rgba(255,255,255,0.3);
    }
    .trust-badges {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 60px;
    }
    .trust-badge {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 30px 40px;
      text-align: center;
      color: white;
    }
    .trust-badge-number {
      font-size: 42px;
      font-weight: 900;
      color: #FFD700;
      margin-bottom: 8px;
    }
    .trust-badge-text {
      font-size: 18px;
      opacity: 0.9;
    }
    .brand-message {
      font-size: 32px;
      color: white;
      font-weight: 500;
      line-height: 1.6;
    }
    .brand-message span {
      color: #FFD700;
      font-weight: 700;
    }
    .decorative-pattern {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(90deg,
        #FFD700 0%, #FFD700 20%,
        #C8102E 20%, #C8102E 40%,
        #FFD700 40%, #FFD700 60%,
        #C8102E 60%, #C8102E 80%,
        #FFD700 80%, #FFD700 100%);
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="brand-section">
    <div class="brand-logo">MIKIHOUSE</div>
    <div class="brand-subtitle">Premium Baby & Kids Brand from Japan</div>

    <div class="brand-story">
      <div class="timeline">
        <div class="timeline-item">
          <div class="timeline-year">1971</div>
          <div class="timeline-text">브랜드 설립</div>
        </div>
        <div class="timeline-divider"></div>
        <div class="timeline-item">
          <div class="timeline-year">50+</div>
          <div class="timeline-text">년의 역사</div>
        </div>
        <div class="timeline-divider"></div>
        <div class="timeline-item">
          <div class="timeline-year">No.1</div>
          <div class="timeline-text">일본 베이비복</div>
        </div>
      </div>

      <div class="trust-badges">
        <div class="trust-badge">
          <div class="trust-badge-number">JAPAN</div>
          <div class="trust-badge-text">Made in Japan Quality</div>
        </div>
        <div class="trust-badge">
          <div class="trust-badge-number">SAFETY</div>
          <div class="trust-badge-text">안전한 소재와 디자인</div>
        </div>
      </div>

      <div class="brand-message">
        일본 엄마들이 <span>50년간</span> 선택해온<br>
        믿을 수 있는 프리미엄 브랜드
      </div>
    </div>
  </div>

  <div class="decorative-pattern"></div>
</body>
</html>
