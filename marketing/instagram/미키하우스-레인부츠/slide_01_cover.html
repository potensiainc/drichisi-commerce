<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }
    .container {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #FFD700 0%, #FFF8DC 50%, #FFD700 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .rain-drops {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.3;
    }
    .rain-drop {
      position: absolute;
      width: 4px;
      height: 30px;
      background: linear-gradient(to bottom, transparent, #C8102E);
      border-radius: 2px;
    }
    .brand-tag {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #C8102E;
      color: white;
      padding: 12px 40px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      border-radius: 30px;
    }
    .main-image {
      width: 600px;
      height: 600px;
      object-fit: contain;
      margin-top: 40px;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.25));
      z-index: 10;
    }
    .headline {
      font-size: 64px;
      font-weight: 900;
      color: #C8102E;
      text-align: center;
      margin-top: 30px;
      line-height: 1.3;
      z-index: 10;
    }
    .subline {
      font-size: 32px;
      font-weight: 500;
      color: #333;
      margin-top: 20px;
      z-index: 10;
    }
    .swipe-hint {
      position: absolute;
      bottom: 40px;
      right: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #666;
      font-size: 18px;
    }
    .arrow {
      width: 40px;
      height: 2px;
      background: #666;
      position: relative;
    }
    .arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -4px;
      border: solid #666;
      border-width: 0 2px 2px 0;
      padding: 4px;
      transform: rotate(-45deg);
    }
    .decoration-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(200, 16, 46, 0.1);
    }
    .circle-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -100px;
    }
    .circle-2 {
      width: 200px;
      height: 200px;
      bottom: 100px;
      left: -50px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="decoration-circle circle-1"></div>
    <div class="decoration-circle circle-2"></div>

    <div class="rain-drops">
      <div class="rain-drop" style="left: 10%; top: 5%;"></div>
      <div class="rain-drop" style="left: 25%; top: 15%;"></div>
      <div class="rain-drop" style="left: 40%; top: 8%;"></div>
      <div class="rain-drop" style="left: 55%; top: 20%;"></div>
      <div class="rain-drop" style="left: 70%; top: 12%;"></div>
      <div class="rain-drop" style="left: 85%; top: 6%;"></div>
      <div class="rain-drop" style="left: 15%; top: 25%;"></div>
      <div class="rain-drop" style="left: 80%; top: 22%;"></div>
    </div>

    <div class="brand-tag">MIKIHOUSE</div>

    <img class="main-image" src="../../products/[미키하우스]_レインブーツ_10-9471-684_키즈/images/multicolor/image_01.jpg" alt="미키하우스 레인부츠">

    <h1 class="headline">비 오는 날도<br>즐거운 외출!</h1>
    <p class="subline">미키하우스 키즈 레인부츠</p>

    <div class="swipe-hint">
      <span>밀어서 더 보기</span>
      <div class="arrow"></div>
    </div>
  </div>
</body>
</html>
