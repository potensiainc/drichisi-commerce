<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(145deg, #FFFEF5 0%, #FFF8E8 100%);
      overflow: hidden;
      position: relative;
    }
    .container {
      width: 100%;
      height: 100%;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .logo {
      position: absolute;
      top: 50px;
      left: 60px;
      width: 180px;
      height: auto;
    }
    .badge {
      position: absolute;
      top: 50px;
      right: 60px;
      background: #C8102E;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
    }
    .hero-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-top: 60px;
    }
    .product-image {
      width: 520px;
      height: 520px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1));
      margin-bottom: 30px;
    }
    .headline {
      text-align: center;
      margin-top: 10px;
    }
    .headline h1 {
      font-size: 52px;
      font-weight: 900;
      color: #2E4057;
      line-height: 1.3;
      letter-spacing: -2px;
    }
    .headline h1 span {
      color: #C8102E;
    }
    .subtitle {
      font-size: 26px;
      color: #666;
      margin-top: 20px;
      font-weight: 500;
    }
    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 30px 0;
    }
    .size-tag {
      background: #FFD700;
      color: #2E4057;
      padding: 14px 32px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 24px;
    }
    .color-dots {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .color-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .color-dot.indigo {
      background: #2E4057;
    }
    .color-dot.beige {
      background: #E8DCC8;
    }
    .swipe-hint {
      position: absolute;
      bottom: 40px;
      right: 60px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #999;
      font-size: 18px;
    }
    .swipe-hint svg {
      width: 24px;
      height: 24px;
      fill: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="file:///D:/commerce/assets/brands/mikihouse/logo.png" alt="MIKIHOUSE" class="logo">
    <div class="badge">JAPAN</div>

    <div class="hero-content">
      <img src="file:///D:/commerce/products/[미키하우스]_9分丈팬츠_팬츠_로고_無地_남아_여아_베이비_키즈_아동복_ズボン_12-3207-797/images/インディゴブルー/nobg/thumbnail_nobg.png" alt="9부 팬츠" class="product-image">
      <div class="headline">
        <h1><span>미키하우스</span> 9부 팬츠</h1>
        <p class="subtitle">심플하지만 브랜드 감성이 살아있는 베이직 팬츠</p>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="size-tag">80 - 130 SIZE</div>
      <div class="color-dots">
        <div class="color-dot indigo"></div>
        <div class="color-dot beige"></div>
      </div>
    </div>

    <div class="swipe-hint">
      <span>밀어서 자세히 보기</span>
      <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
    </div>
  </div>
</body>
</html>
