<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans KR', sans-serif;
      background: #C8102E;
      overflow: hidden;
      position: relative;
    }
    .container {
      width: 100%;
      height: 100%;
      padding: 60px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      width: 140px;
      height: auto;
    }
    .slide-number {
      color: rgba(255,255,255,0.4);
      font-size: 20px;
      font-weight: 500;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .title {
      color: white;
      font-size: 48px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 50px;
    }
    .title span {
      color: #FFD700;
    }
    .size-grid {
      display: flex;
      gap: 20px;
      margin-bottom: 50px;
    }
    .size-item {
      width: 130px;
      height: 130px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
    }
    .size-item.highlight {
      background: #FFD700;
    }
    .size-number {
      font-size: 42px;
      font-weight: 900;
      color: white;
    }
    .size-item.highlight .size-number {
      color: #C8102E;
    }
    .size-age {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      margin-top: 5px;
    }
    .size-item.highlight .size-age {
      color: rgba(200,16,46,0.7);
    }
    .info-box {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 30px 50px;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .info-icon {
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info-icon svg {
      width: 30px;
      height: 30px;
      fill: #C8102E;
    }
    .info-text {
      color: white;
      font-size: 22px;
      line-height: 1.5;
    }
    .info-text strong {
      color: #FFD700;
    }
    .decorative-circle {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .circle-1 {
      top: -100px;
      right: -100px;
    }
    .circle-2 {
      bottom: -150px;
      left: -100px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="decorative-circle circle-1"></div>
    <div class="decorative-circle circle-2"></div>

    <div class="header">
      <img src="file:///D:/commerce/assets/brands/mikihouse/logo_nobg.png" alt="MIKIHOUSE" class="logo">
      <span class="slide-number">5 / 7</span>
    </div>

    <div class="content">
      <h2 class="title">베이비부터 키즈까지<br><span>6가지 사이즈</span></h2>

      <div class="size-grid">
        <div class="size-item">
          <div class="size-number">80</div>
          <div class="size-age">12M</div>
        </div>
        <div class="size-item">
          <div class="size-number">90</div>
          <div class="size-age">2Y</div>
        </div>
        <div class="size-item highlight">
          <div class="size-number">100</div>
          <div class="size-age">3-4Y</div>
        </div>
        <div class="size-item highlight">
          <div class="size-number">110</div>
          <div class="size-age">4-5Y</div>
        </div>
        <div class="size-item">
          <div class="size-number">120</div>
          <div class="size-age">5-6Y</div>
        </div>
        <div class="size-item">
          <div class="size-number">130</div>
          <div class="size-age">7-8Y</div>
        </div>
      </div>

      <div class="info-box">
        <div class="info-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <div class="info-text">
          <strong>허리 조절 가능</strong>한 아저스터로<br>
          성장에 맞춰 오래 입힐 수 있어요
        </div>
      </div>
    </div>
  </div>
</body>
</html>
