    .headline {
      font-size: 46px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.4;
      text-shadow:

    .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
