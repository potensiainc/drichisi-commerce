<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>미키하우스 퍼즐블록 백팩 - Slide 01 Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(180deg, #FFF5EE 0%, #FFB6C1 100%);
    }

    .top-brand {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
    }

    .top-brand img {
      width: 180px;
      height: auto;
    }

    .product-image {
      position: absolute;
      top: 140px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px;
      height: auto;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2));
    }

    .content {
      position: absolute;
      bottom: 120px;
      left: 160px;
      right: 80px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .brand-tag {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #FF6B9D;
      text-transform: uppercase;
    }

    .headline {
      font-size: 48px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.35;
    }

    .highlight {
      color: #FF6B9D;
      font-weight: 800;
    }

    .corner {
      position: absolute;
      width: 50px;
      height: 50px;
      border-color: rgba(255, 107, 157, 0.3);
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 40px; left: 40px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 40px; right: 40px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 107, 157, 0.3);
    }

    .dot.active {
      background: #FF6B9D;
      width: 24px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="top-brand">
      <img src="file:///D:/commerce/assets/brands/mikihouse/logo.png" alt="mikiHOUSE">
    </div>

    <img class="product-image" src="file:///D:/commerce/products/[미키하우스]_リュック_リュックサック_バッグ_かばん_로고_くま_うさぎ_남아_여아_키즈_베이비_아동_통원_10-8213-687/images/nobg/pink_01_nobg.png" alt="미키하우스 퍼즐블록 백팩">

    <div class="content">
      <span class="brand-tag">Since 1948</span>
      <h1 class="headline">
        우리 아이 <span class="highlight">통원 백팩</span><br>
        퍼즐블록 디자인으로 더 사랑스럽게
      </h1>
    </div>

    <div class="slide-indicator">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
