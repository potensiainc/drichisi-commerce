  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(180deg, #FFFFFF 0%, #F5F5F5 100%);
      display: flex;
      flex-direction: column;
      padding: 80px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 40px;
    }

    .feature-number {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: #FF6B9D;
      text-transform: uppercase;
    }

    .headline {
      font-size: 46px;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.4;
    }

    .highlight {
      color: #FF6B9D;
      font-weight: 800;
    }

    .size-grid {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      padding: 20px 0;
    }

    .size-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .size-item img {
      height: 400px;
      width: auto;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.15));
    }

    .size-item:first-child img {
      height: 340px;
    }

    .size-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .size-name {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      padding: 10px 30px;
      background: rgba(255, 107, 157, 0.1);
      border-radius: 25px;
    }

    .size-detail {
      font-size: 18px;
      font-weight: 500;
      color: #666;
    }

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #E0E0E0;
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: 30px; left: 30px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 30px; right: 30px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 30px; left: 30px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 30px; right: 30px; border-bottom-width: 2px; border-right-width: 2px; }

    .slide-indicator {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #E0E0E0;
    }

    .dot.active {
      background: #FF6B9D;
      width: 24px;
      border-radius: 3px;
    }
